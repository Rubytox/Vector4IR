# Vector_Windows_EZTools_AmcacheParser_AmCache-Program-Entries config.
# Description: Process Windows artefacts parsed with AmcacheParser (CSV output).
#              Filename should match: "*Amcache_ProgramEntries.csv"
#              AmcacheParser command: AmcacheParser.exe -f %sourceFile% --csv %destinationDirectory% -i
#              Example command: AmcacheParser.exe -f "C:\Windows\appcompat\Programs\Amcache.hve" --csv <YOUR_OUTPUT>
#              source = "windows_amcache-programentries" & sourcetype = "windows_artefact"
# Author(s): Jérôme BREBION, Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.AmcacheParser_AmCache-Program-Entries_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the AmcacheParser AmCache Program Entries files is required.}/*/ProgramExecution/*Amcache_ProgramEntries.csv"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.AmcacheParser_AmCache-Program-Entries_csv_parser]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_csv_input"]
  source = '''
    # Expect CSV header:
    # Old: ProgramId,KeyLastWriteTimestamp,Name,Version,Publisher,InstallDate,OSVersionAtInstallTime,BundleManifestPath,HiddenArp,InboxModernApp,Language,ManifestPath,MsiPackageCode,MsiProductCode,PackageFullName,ProgramInstanceId,RegistryKeyPath,RootDirPath,Type,Source,StoreAppType,UninstallString,InstallDateArpLastModified,InstallDateMsi,InstallDateFromLinkFile,Manufacturer
    # New: ProgramId,KeyLastWriteTimestamp,Name,Version,Publisher,InstallDateArpLastModified,InstallDate,InstallDateMsi,OSVersionAtInstallTime,InstallDateFromLinkFile,BundleManifestPath,HiddenArp,InboxModernApp,Language,ManifestPath,MsiPackageCode,MsiProductCode,PackageFullName,ProgramInstanceId,RegistryKeyPath,RootDirPath,Type,Source,StoreAppType,UninstallString,Manufacturer
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    if .__offset == 0 {
      expected_header = "ProgramId,KeyLastWriteTimestamp,Name,Version,Publisher,InstallDateArpLastModified,InstallDate,InstallDateMsi,OSVersionAtInstallTime,InstallDateFromLinkFile,BundleManifestPath,HiddenArp,InboxModernApp,Language,ManifestPath,MsiPackageCode,MsiProductCode,PackageFullName,ProgramInstanceId,RegistryKeyPath,RootDirPath,Type,Source,StoreAppType,UninstallString,Manufacturer"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .programid = fields[0]
    .keylastwritetimestamp = fields[1]
    .name = fields[2]
    .version = fields[3]
    .publisher = fields[4]
    .installdatearplastmodified = fields[5]
    .installdate = fields[6]
    .installdatemsi = fields[7]
    .osversionatinstalltime = fields[8]
    .installdatefromlinkfile = fields[9]
    .bundlemanifestpath = fields[10]
    .hiddenarp = fields[11]
    .inboxmodernapp = fields[12]
    .language = fields[13]
    .manifestpath = fields[14]
    .msipackagecode = fields[15]
    .msiproductcode = fields[16]
    .packagefullname = fields[17]
    .programinstanceid = fields[18]
    .registrykeypath = fields[19]
    .rootdirpath = fields[20]
    .type = fields[21]
    .source = fields[22]
    .storeapptype = fields[23]
    .uninstallstring = fields[24]
    .manufacturer = fields[25]

    .exe = .name

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .category = "execution"
    .source = "windows_amcache-programentries"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_coerce]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_unknown_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.keylastwritetimestamp) && is_nullish(.installdate) && is_nullish(.installdatearplastmodified) && is_nullish(.installdatemsi) && is_nullish(.installdatefromlinkfile) {
      log("Timestamp is null for event, defaulting to current time.", level: "warn")
      .timestamp = now()
      .operation = "program_unknown"
    } else {
      abort
    }
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_KeyLastWriteTimestamp_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.keylastwritetimestamp) {
      abort
    }

    .timestamp = .keylastwritetimestamp
    .operation = "program_modification_keylastwritetimestamp"
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_InstallDate_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.installdate) {
      abort
    }

    .timestamp = .installdate
    .operation = "creation"
    .suboperation = "program_installationdate"
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_InstallDateArpLastModified_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.installdatearplastmodified) {
      abort
    }

    .timestamp = .installdatearplastmodified
    .operation = "modification"
    .suboperation = "program_installdatearplastmodified"
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_InstallDateMsi_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.installdatemsi) {
      abort
    }

    .timestamp = .installdatemsi
    .operation = "creation"
    .suboperation = "program_installdatemsi"
  '''

[transforms.AmcacheParser_AmCache-Program-Entries_dedup_InstallDateFromLinkFile_to_sink]
  type = "remap"
  inputs = ["AmcacheParser_AmCache-Program-Entries_coerce"]
  source = '''
    if is_nullish(.installdatefromlinkfile) {
      abort
    }

    .timestamp = .installdatefromlinkfile
    .operation = "creation"
    .suboperation = "program_installdatefromlinkfile"
  '''
