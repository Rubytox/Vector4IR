# Vector_Windows_NirSoft_BrowsingHistoryView config.
# Description: Process Windows web browsers history artefacts parsed with NirSoft's BrowsingHistoryView (CSV output).
#              Filename should match: "*BrowsingHistory*.csv"
#              BrowsingHistoryView command: browsinghistoryview.exe /HistorySource 3 /HistorySourceFolder %sourceDirectory%\Users /VisitTimeFilterType 1 /ShowTimeInGMT 1 /scomma %destinationDirectory%\BrowsingHistory.csv
#              source = "windows_browsers_history" & sourcetype = "windows_artefact"
# Author(s): Thomas DIOT (_Qazeer)
# Version: 1.0
# Last modified: 2022-09-28
# Required environment variables:
#   INPUT_FOLDER = "<INPUT_FOLDER>"
#   VECTOR_TEMP_FOLDER = "<VECTOR_TEMP_FOLDER>"
#   SOURCE_HOST = "<SOURCE_HOST>"

# Temporary folder used by Vector.
data_dir = "${VECTOR_TEMP_FOLDER:?A directory for Vector temporary data is required}"

# Set the default timezone to UTC+0 for timestamps that do not include a timezone.
timezone = "Etc/UTC"

[sources.BrowsingHistoryView_csv_input]
  type = "file"
  include = ["${INPUT_FOLDER:?The input folder containing the BrowsingHistoryView CSV output is required.}/*/WebBrowsers/*BrowsingHistory*.csv"]
  ignore_checkpoints = true
  read_from = "beginning"
  oldest_first = false
  glob_minimum_cooldown_ms = 100000
  fingerprint.strategy = "device_and_inode"
  max_line_bytes = 100_000_000
  offset_key = "__offset"

[transforms.BrowsingHistoryView_csv_parser]
  type = "remap"
  inputs = ["BrowsingHistoryView_csv_input"]
  source = '''
    # Expect CSV header:
    # URL,Title,Visit Time,Visit Count,Visited From,Visit Type,Visit Duration,Web Browser,User Profile,Browser Profile,URL Length,Typed Count,History File,Record ID
    fields, err = parse_csv(.message, delimiter: ",")
    if err != null {
      log("Unable to split CSV: " + err, level: "error")
    }

    if .__offset == 0 {
      expected_header = "URL,Title,Visit Time,Visit Count,Visited From,Visit Type,Visit Duration,Web Browser,User Profile,Browser Profile,URL Length,Typed Count,History File,Record ID"
      current_header = strip_whitespace(string!(.message))
      if expected_header != current_header {
        log("Unexpected CSV header, possible non-integrated tool update!\n=> Expected CSV header: " + expected_header + "\n=> Got CSV header:      " + current_header, level: "error")
      }
      abort
    }

    .url = fields[0]
    .title = fields[1]
    # Format can be: 20/03/2020 12:05:08 or 03/20/2020 12:05:08 [AM|PM]
    .visit_time = parse_timestamp(fields[2], format: "%d/%m/%Y %H:%M:%S") ?? parse_timestamp(fields[2], format: "%m/%d/%Y %I:%M:%S %p") ?? parse_timestamp(fields[2], format: "%m/%d/%Y %I:%M:%S %P") ?? fields[2]
    if !is_timestamp(.visit_time) {
        log("Failed to convert timestamp: " + string!(fields[2]), level: "warn")
        .visit_time = fields[2]
    }
    .visit_count = fields[3]
    .visited_from = fields[4]
    .visit_type = fields[5]
    .visit_duration = fields[6]
    .webbrowser = fields[7]
    .user_profile = fields[8]
    .user = .user_profile
    .browser_profile = fields[9]
    .url_length = fields[10]
    .typed_count = fields[11]
    .history_file = fields[12]
    .recordid = fields[13]

    .timestamp = .visit_time

    # Add the metadata fields following the parsing.
    .sourcehost = "${SOURCE_HOST:?The source host is required}"
    .host = .sourcehost
    .category = "webbrowsing"
    .source = "windows_browsers_history"
    .sourcetype = "windows_artefact"

    # Delete irrelevant default fields.
    del(.source_type)
    del(.file)
    del(.message)
    del(.__offset)
  '''

[transforms.BrowsingHistoryView_coerce_to_sink]
  type = "remap"
  inputs = ["BrowsingHistoryView_csv_parser"]
  source = '''
    . = map_values(.) -> |value| {
      value_string, convert_err = string(value)
      # Only coerce string (and not already casted types, such as int, timestamps, etc.).
      if convert_err != null {
        value
      # Matches a timestamp in various format ("T" or space separated, with or without post second precision, and with or without a timezone identifier).
      } else if (match(value_string, r'^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[0-1])[T|\s]([01][0-9]|2[0-3]):([0-5][0-9]):([0-5][0-9])(\.[0-9]{1,9})?(\s?[\+|\-]([01][0-9]|2[0-4]):?([0-5][0-9]))?$')) {
        tmp_value = parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f%z") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f %z") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S") ?? parse_timestamp(value_string, format: "%Y-%m-%dT%H:%M:%S%.f") ?? parse_timestamp(value_string, format: "%Y-%m-%d %H:%M:%S%.f") ?? value_string
        if is_string(tmp_value) {
          log("Failed to convert timestamp: " + value_string, level: "warn")
          value
        } else {
          tmp_value
        }
      } else if (tmp_value, err = parse_int(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_bool(value); err == null) {
        tmp_value
      } else if (tmp_value, err = to_float(value); err == null) {
        tmp_value
      } else {
        value
      }
    }
  '''
